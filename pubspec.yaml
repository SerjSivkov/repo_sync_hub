name: repo_sync_hub
description: "macOS-инструмент: сканирование git-проектов, pull main/master, push на GitLab."
publish_to: 'none'
version: 1.2.0+6

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.3
  path: ^1.9.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: false
  ios: false
  image_path: assets/images/app_icon.png
  macos:
    generate: true
    image_path: assets/images/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png
    - assets/CHANGELOG.md
